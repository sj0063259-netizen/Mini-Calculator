<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
    <div class="trick">
        <h1>Calculator</h1>
    </div>
    <div class="calculator-container">
    <div class="calculator">

<input type="text" id="display" readonly>
<div class="buttons">
<div class="pro">
    <button class="get">x</button>
</div>
<div class="pro">
    <button class="get"><b>/</b></button>
</div>
<div class="pro">
    <button class="get">DEL</button>
</div>
<div class="pro">
    <button class="hero">AC</button>
</div>
    <div class="pro">
     <button>7</button>
    </div>
   <div class="pro">
     <button>8</button>
   </div>
<div class="pro">
    <button>9</button>
</div>
<div class="pro">
    <button class="get"><b>+</b></button>
</div>
<div class="pro">
<button>4</button>
</div>
<div class="pro">
<button>5</button>
</div>
<div class="pro">
<button>6</button>
</div>
<div class="pro">
<button class="get"><b>-</b></button>
</div>
<div class="pro">
<button>1</button>
</div>
<div class="pro">
<button>2</button>
</div>
<div class="pro">
<button>3</button>
</div>
<div class="pro">
<button class="get">rem</button>
</div>
<div class="pro">
<button class="get">0</button>
</div>
<div class="pro">
<button class="get">e<sup>x</sup></button>
</div>
<div class="pro">
<button class="get">(.)</button>
</div>
<div class="pro">
<button class="hero">=</button>
</div>
</div>
</div>

</div>
<script src="index.js"></script>
</body>
</html>
