<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
 background-color: #020617;
 margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#1e293b);
    }
    .trick{
         font-size: 36px;
    margin-bottom: 10px;
    text-align: center;
    background: linear-gradient(90deg,#ef4444,#f59e0b);
    -webkit-text-fill-color: transparent;
     -webkit-background-clip: text;
        margin-top: 10px;
        padding: 5px;
      }
    #display{
        width: 100%;
        height: 60px;
        font-size: 24px;
        margin-bottom: 10px;
        text-align: right;
        padding:10px;
        box-sizing: border-box;
    }
    .calculator-container{
        display: grid;
        grid-template-columns: repeat(1,1fr);
        padding: 10px;
        gap: 20px;
        max-width: 1100px;
        margin: auto;
        align-items: stretch;
    }
    .calculator{
        width:90%;
        max-width: 320px;
        margin: auto;
         background-color: white;
        padding: 45px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    text-align: center;
    }
    .buttons{
          display: grid;
        grid-template-columns: repeat(4,1fr);
        padding: 20px;
        gap: 10px;
        
    }
    .pro{ .pro{
background-color:#020617;
padding:6px;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
}}
      button{
        background: linear-gradient(135deg,#ef4444,#dc2626);
        color: white;
        border: none;
        width: 100%;
        height: 50px;
        padding: 12px 22px;
        cursor: pointer;
        border-radius: 8px;
        font-weight: 600;
        transition: all 0.3s ease;
    }
     @media (max-width:480px){
        h1{
            font-size: 32px;
        }

.calculator{
padding:20px;
}

#display{
height:50px;
font-size:20px;
}

button{
height:45px;
font-size:16px;
gap:8px;
}

}
</style>
<body>
    <div class="trick">
        <h1>Calculator</h1>
    </div>
    <div class="calculator-container">
    <div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">
    <div class="pro">
     <button>1</button>
    </div>
   <div class="pro">
     <button>2</button>
   </div>
<div class="pro">
    <button>3</button>
</div>
<div class="pro">
    <button>C</button>
</div>
<div class="pro">
<button>4</button>
</div>
<div class="pro">
<button>5</button>
</div>
<div class="pro">
<button>6</button>
</div>
<div class="pro">
<button>+</button>
</div>
<div class="pro">
<button>7</button>
</div>
<div class="pro">
<button>8</button>
</div>
<div class="pro">
<button>9</button>
</div>
<div class="pro">
<button>=</button>
</div>
<div class="pro">
<button>0</button>
</div>
<div class="pro">
<button>/</button>
</div>
<div class="pro">
<button>-</button>
</div>
<div class="pro">
<button>x</button>
</div>
</div>
</div>

</div>
<script src="index.js"></script>
</body>
</html>
